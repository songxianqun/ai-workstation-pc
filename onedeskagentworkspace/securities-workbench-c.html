<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>证券客户经理工作台 · AI对话驱动</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #EFEFEA;
  --dark: #111827;
  --dark2: #1F2937;
  --gold: #C9A96E;
  --gold-l: #E8D4A8;
  --gold-dim: rgba(201,169,110,0.12);
  --card: #FFFFFF;
  --border: #E5E3DB;
  --t1: #111827;
  --t2: #4B5563;
  --t3: #9CA3AF;
  --green: #059669;
  --red: #DC2626;
  --orange: #D97706;
  --blue: #2563EB;
  --chat-w: 520px;
  --panel-w: 580px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--t1);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ============================
   顶栏（极简）
   ============================ */
.topbar {
  height: 48px;
  background: var(--dark);
  display: flex;
  align-items: center;
  padding: 0 20px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(201,169,110,0.18);
  z-index: 100;
}
.tb-logo { color: var(--gold); font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.tb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.tb-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.tb-today { font-size: 11px; color: rgba(255,255,255,0.3); }
.tb-user { display: flex; align-items: center; gap: 7px; }
.tb-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),var(--gold-l)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--dark); }
.tb-name { font-size: 12px; color: rgba(255,255,255,0.5); }

/* ============================
   主区域：左对话 + 右面板
   ============================ */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ============================
   左：对话区（居中窄列）
   ============================ */
.chat-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  transition: flex 0.35s cubic-bezier(0.4,0,0.2,1);
}

.chat-scroll {
  flex: 1;
  width: 100%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 0 16px;
}
.chat-scroll::-webkit-scrollbar { width: 4px; }
.chat-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

.chat-inner {
  width: 100%;
  max-width: var(--chat-w);
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

/* ——— 消息气泡 ——— */
.msg { display: flex; flex-direction: column; gap: 5px; }
.msg.user { align-items: flex-end; }
.msg.ai { align-items: flex-start; }

.msg-row { display: flex; align-items: flex-end; gap: 8px; }
.msg.user .msg-row { flex-direction: row-reverse; }

.ai-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--dark);
  border: 1px solid rgba(201,169,110,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}

.bubble {
  max-width: 88%;
  padding: 11px 15px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.75;
}
.msg.ai .bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  color: var(--t1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.msg.user .bubble {
  background: var(--dark);
  color: rgba(255,255,255,0.9);
  border-radius: 14px 4px 14px 14px;
  font-size: 13px;
}
.msg-time { font-size: 10px; color: var(--t3); padding: 0 5px; }

/* 消息内展开按钮组 */
.expand-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.exp-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--t2);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.exp-btn:hover, .exp-btn.active { border-color: var(--gold); background: var(--gold-dim); color: var(--t1); font-weight: 500; }

/* 联想行动指令 */
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.chip {
  font-size: 12px; padding: 5px 12px; border-radius: 20px;
  border: 1px solid rgba(201,169,110,0.3);
  background: rgba(201,169,110,0.07);
  color: var(--t1); cursor: pointer; transition: all 0.18s;
}
.chip:hover { background: var(--gold-dim); border-color: var(--gold); }

/* 打字动画 */
.typing-row { display: flex; align-items: center; gap: 8px; }
.typing-bub {
  padding: 11px 15px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  display: flex; gap: 5px; align-items: center;
}
.td { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: td 1.2s infinite; }
.td:nth-child(2) { animation-delay: 0.2s; }
.td:nth-child(3) { animation-delay: 0.4s; }
@keyframes td { 0%,80%,100%{opacity:0.25;transform:scale(0.6)} 40%{opacity:1;transform:scale(1)} }

/* ——— 底部输入区 ——— */
.input-zone {
  flex-shrink: 0;
  width: 100%;
  max-width: var(--chat-w);
  padding: 10px 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.suggests { display: flex; gap: 6px; flex-wrap: wrap; }
.sg {
  font-size: 12px; padding: 5px 13px; border-radius: 16px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--t2); cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.sg:hover { border-color: var(--gold); background: var(--gold-dim); color: var(--t1); }

.input-box {
  background: var(--card);
  border: 1.5px solid rgba(201,169,110,0.3);
  border-radius: 16px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 12px 10px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-box:focus-within {
  border-color: var(--gold);
  box-shadow: 0 2px 20px rgba(201,169,110,0.15);
}
.input-box textarea {
  flex: 1; background: none; border: none; outline: none;
  font-size: 14px; color: var(--t1); resize: none;
  max-height: 100px; line-height: 1.5; font-family: inherit;
}
.input-box textarea::placeholder { color: var(--t3); }
.tool-btns { display: flex; align-items: center; gap: 5px; }
.tbtn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 14px; transition: all 0.18s;
}
.tbtn:hover { border-color: var(--gold); background: var(--gold-dim); }
.send-btn {
  width: 34px; height: 34px; border-radius: 10px; background: var(--dark);
  border: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.2s;
}
.send-btn:hover { background: var(--gold); }
.send-btn svg { width: 16px; height: 16px; fill: white; }
.input-hint { font-size: 10px; color: var(--t3); text-align: center; }


/* ============================
   右：文档画布面板（Canvas 风格）
   ============================ */
.canvas-panel {
  width: var(--panel-w);
  flex-shrink: 0;
  background: #FAFAF8;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  position: absolute;
  right: 0; top: 0; bottom: 0;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index: 50;
  box-shadow: -2px 0 20px rgba(0,0,0,0.07);
}
.canvas-panel.open {
  transform: translateX(0);
  position: relative;
}

/* 面板顶栏 */
.cp-bar {
  height: 48px;
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: white;
}
.cp-close {
  width: 28px; height: 28px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--t3); font-size: 13px; transition: all 0.18s;
}
.cp-close:hover { background: var(--border); color: var(--t1); }
.cp-label {
  font-size: 11px; padding: 2px 9px; border-radius: 10px;
  font-weight: 600; letter-spacing: 0.3px;
}
.cp-title { font-size: 14px; font-weight: 600; color: var(--t1); flex: 1; }
.cp-actions { display: flex; gap: 6px; }
.cp-action-btn {
  font-size: 11px; padding: 4px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--t2); cursor: pointer; transition: all 0.18s;
}
.cp-action-btn:hover { border-color: var(--gold); background: var(--gold-dim); color: var(--t1); }

/* 面板标签栏 */
.cp-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  background: white;
  flex-shrink: 0;
}
.cptab {
  font-size: 12.5px; padding: 10px 14px;
  color: var(--t3); border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.cptab.on { color: var(--t1); border-bottom-color: var(--gold); font-weight: 600; }
.cptab:hover:not(.on) { color: var(--t2); }

/* ——— 文档正文区域（Canvas 核心） ——— */
.cp-doc {
  flex: 1;
  overflow-y: auto;
  padding: 40px 48px;
  background: white;
  line-height: 1.8;
}
.cp-doc::-webkit-scrollbar { width: 4px; }
.cp-doc::-webkit-scrollbar-thumb { background: #E5E3DB; border-radius: 2px; }

/* 文档内排版 */
.doc-eyebrow {
  font-size: 11px; font-weight: 700; color: var(--gold);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
}
.doc-h1 {
  font-size: 22px; font-weight: 700; color: var(--t1);
  line-height: 1.3; margin-bottom: 6px;
}
.doc-h2 {
  font-size: 16px; font-weight: 700; color: var(--t1);
  margin: 28px 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.doc-h3 {
  font-size: 13.5px; font-weight: 700; color: var(--t1);
  margin: 18px 0 6px;
}
.doc-meta {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
  padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.doc-meta-tag {
  font-size: 11px; padding: 3px 9px; border-radius: 4px; font-weight: 600;
}
.doc-p {
  font-size: 14px; color: var(--t2); line-height: 1.85; margin-bottom: 14px;
}
.doc-p strong { color: var(--t1); font-weight: 600; }

/* 信息表格 */
.doc-table {
  width: 100%; border-collapse: collapse; margin: 14px 0 20px;
  font-size: 13px;
}
.doc-table th {
  text-align: left; padding: 8px 12px;
  background: #F5F4F0; color: var(--t3);
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.doc-table td {
  padding: 10px 12px; color: var(--t1);
  border-bottom: 1px solid #F0EFEA; vertical-align: top;
  font-size: 13px; line-height: 1.6;
}
.doc-table tr:last-child td { border-bottom: none; }
.doc-table td strong { color: var(--t1); }

/* AI判定框 */
.doc-ai-box {
  background: linear-gradient(135deg, #FFFBF3, #FFF7EB);
  border: 1px solid rgba(201,169,110,0.3);
  border-left: 3px solid var(--gold);
  border-radius: 6px;
  padding: 14px 18px;
  margin: 14px 0;
}
.doc-ai-box-label {
  font-size: 10px; font-weight: 700; color: var(--gold);
  letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px;
}
.doc-ai-box-text {
  font-size: 14px; color: var(--t1); line-height: 1.8;
}

/* 产品推荐条目 */
.doc-product {
  padding: 14px 0;
  border-bottom: 1px solid #F0EFEA;
  display: flex; align-items: flex-start; gap: 14px;
}
.doc-product:last-child { border-bottom: none; }
.doc-prod-rank {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.doc-prod-body { flex: 1; }
.doc-prod-name { font-size: 14px; font-weight: 700; color: var(--t1); margin-bottom: 3px; }
.doc-prod-reason { font-size: 13px; color: var(--t2); line-height: 1.6; margin-bottom: 6px; }
.doc-prod-meta { display: flex; gap: 8px; align-items: center; }
.doc-prod-ret { font-size: 14px; font-weight: 700; color: var(--green); }
.doc-prod-type { font-size: 11px; color: var(--t3); }
.doc-prod-score {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--t3);
}
.score-track { width: 60px; height: 3px; background: #E5E3DB; border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; background: var(--gold); border-radius: 2px; }
.doc-prod-match { font-size: 11px; color: var(--gold); font-weight: 600; }

/* 动作清单 */
.doc-action {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid #F0EFEA;
  transition: opacity 0.2s;
}
.doc-action:last-child { border-bottom: none; }
.doc-action.done { opacity: 0.4; }
.doc-act-chk {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; margin-top: 2px; transition: all 0.18s;
}
.doc-act-chk.on { background: var(--green); border-color: var(--green); color: white; }
.doc-act-body { flex: 1; }
.doc-act-name { font-size: 14px; font-weight: 700; color: var(--t1); margin-bottom: 3px; }
.doc-act-std { font-size: 13px; color: var(--t2); line-height: 1.6; margin-bottom: 6px; }
.doc-act-tags { display: flex; gap: 6px; }
.doc-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.tag-time { background: #F0EFEA; color: var(--t3); }
.tag-h { background: rgba(220,38,38,0.07); color: var(--red); }
.tag-m { background: rgba(217,119,6,0.07); color: var(--orange); }
.doc-act-exec {
  font-size: 12px; color: var(--gold); cursor: pointer;
  padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(201,169,110,0.3);
  flex-shrink: 0; transition: all 0.18s; align-self: flex-start;
}
.doc-act-exec:hover { background: var(--gold-dim); }

/* 合规列表 */
.doc-verify {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid #F0EFEA;
}
.doc-verify:last-child { border-bottom: none; }
.dv-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.dv-body { flex: 1; }
.dv-label { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.dv-desc { font-size: 13px; color: var(--t2); }
.dv-result { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; flex-shrink: 0; align-self: flex-start; }
.dvp { background: rgba(5,150,105,0.1); color: var(--green); }
.dvw { background: rgba(217,119,6,0.1); color: var(--orange); }
.dvf { background: rgba(220,38,38,0.1); color: var(--red); }

/* 业绩指标行 */
.doc-kpi-row { display: flex; gap: 1px; margin: 16px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.doc-kpi-cell { flex: 1; padding: 16px 18px; background: white; text-align: center; border-right: 1px solid var(--border); }
.doc-kpi-cell:last-child { border-right: none; }
.doc-kpi-num { font-size: 20px; font-weight: 700; color: var(--t1); margin-bottom: 3px; }
.doc-kpi-label { font-size: 11px; color: var(--t3); }
.doc-kpi-delta { font-size: 11px; margin-top: 3px; }
.up { color: var(--green); }
.dn { color: var(--red); }

/* 进度条组 */
.doc-progress-row { margin-bottom: 16px; }
.doc-prog-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 7px; }
.doc-prog-label { color: var(--t2); }
.doc-prog-val { font-weight: 700; }
.doc-prog-bar { height: 6px; background: #F0EFEA; border-radius: 3px; overflow: hidden; }
.doc-prog-fill { height: 100%; border-radius: 3px; }

/* 任务看板列表 */
.doc-task-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; border-bottom: 1px solid #F0EFEA; cursor: pointer;
}
.doc-task-row:last-child { border-bottom: none; }
.doc-task-row:hover { opacity: 0.8; }
.dtdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dt-client { font-size: 14px; font-weight: 600; flex: 1; }
.dt-action { font-size: 13px; color: var(--t2); }
.dt-time { font-size: 11px; color: var(--t3); }
.dt-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.dst-p { background: rgba(217,119,6,0.1); color: var(--orange); }
.dst-d { background: rgba(5,150,105,0.1); color: var(--green); }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="tb-logo">
    <div class="tb-dot"></div>
    AI 工作台
  </div>
  <div class="tb-right">
    <span class="tb-today">2026年6月22日 · 周一</span>
    <div class="tb-user">
      <div class="tb-avatar">张</div>
      <span class="tb-name">张伟</span>
    </div>
  </div>
</div>

<div class="main" id="main">

  <!-- 左：对话列 -->
  <div class="chat-col" id="chat-col">
    <div class="chat-scroll" id="chat-scroll">
      <div class="chat-inner" id="chat-inner"></div>
    </div>
    <div class="input-zone">
      <div class="suggests" id="suggests">
        <div class="sg" onclick="qs(this)">📊 今日待跟进客户</div>
        <div class="sg" onclick="qs(this)">📋 分析王建国</div>
        <div class="sg" onclick="qs(this)">📦 产品匹配结果</div>
        <div class="sg" onclick="qs(this)">📞 今日待执行动作</div>
      </div>
      <div class="input-box">
        <textarea id="main-input" rows="1" placeholder="告诉我你要做什么…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="tool-btns">
          <div class="tbtn" title="@客户" onclick="ins('@')">👤</div>
          <div class="tbtn" title="#产品" onclick="ins('#')">📦</div>
        </div>
        <button class="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </div>

  <!-- 右：文档画布面板 -->
  <div class="canvas-panel" id="canvas-panel">
    <div class="cp-bar">
      <div class="cp-close" onclick="closeCanvas()">✕</div>
      <div class="cp-label" id="cp-label"></div>
      <div class="cp-title" id="cp-title"></div>
      <div class="cp-actions" id="cp-actions"></div>
    </div>
    <div class="cp-tabs" id="cp-tabs"></div>
    <div class="cp-doc" id="cp-doc"></div>
  </div>

</div>

<script>
/* ============================================================
   数据
   ============================================================ */
const CLIENTS = {
  '王建国': {
    label:'高净值·激活型', asset:'¥ 680万', risk:'稳健型', contact:'电话沟通',
    age:'52岁', job:'企业主', lastContact:'昨日',
    labelBg:'rgba(220,38,38,0.1)', labelColor:'#DC2626',

/* ============================================================
   画布面板
   ============================================================ */
let canvasOpen = false;
let _tabRender = null;

function openCanvas(title, label, labelBg, labelColor, tabs, actions, renderFn) {
  document.getElementById('cp-title').textContent = title;
  const lbl = document.getElementById('cp-label');
  lbl.textContent = label;
  lbl.style.background = labelBg;
  lbl.style.color = labelColor;

  // tabs
  const tabsEl = document.getElementById('cp-tabs');
  if (tabs.length > 1) {
    tabsEl.style.display = 'flex';
    tabsEl.innerHTML = tabs.map((t,i) => `<div class="cptab ${i===0?'on':''}" onclick="switchTab(${i})">${t}</div>`).join('');
  } else {
    tabsEl.style.display = 'none';
  }

  // actions
  document.getElementById('cp-actions').innerHTML = actions.map(a => `<div class="cp-action-btn" onclick="${a.fn}">${a.label}</div>`).join('');

  _tabRender = renderFn;
  renderFn(0);

  if (!canvasOpen) {
    document.getElementById('canvas-panel').classList.add('open');
    canvasOpen = true;
  }
}

function switchTab(i) {
  document.querySelectorAll('.cptab').forEach((t,idx) => t.classList.toggle('on', idx===i));
  _tabRender && _tabRender(i);
}

function closeCanvas() {
  document.getElementById('canvas-panel').classList.remove('open');
  canvasOpen = false;
}

function toggleAct(name, idx) {
  CLIENTS[name].actions[idx].done = !CLIENTS[name].actions[idx].done;
  openClientCanvas(name);
  setTimeout(() => switchTab(2), 20);
}

function doExec(name, actionName) {
  addMsg('ai', `✅ 已执行「${actionName}」，执行结果已记录到 ${name} 的服务档案。`);
}

function execTopAction(name) {
  const c = CLIENTS[name];
  const first = c.actions.find(a => !a.done);
  if (first) doExec(name, first.name);
}

function handleTaskClick(name) {
  if (CLIENTS[name]) {
    openClientCanvas(name);
    addMsg('ai', `已打开 ${name} 的详情文档，可在右侧查看客户分析、产品匹配和执行动作。`);
  }
}

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.id = 'msg-' + (++msgId);

  if (role === 'ai') {
    div.innerHTML = `
      <div class="msg-row">
        <div class="ai-avatar">⚡</div>
        <div class="bubble">${html}
          ${extras?.expand ? `<div class="expand-row">${extras.expand.map(e => `<div class="exp-btn" data-fn="${e.fn}" onclick="handleExpBtn(this)">${e.icon} ${e.label}</div>`).join('')}</div>` : ''}
          ${extras?.chips ? `<div class="chip-row">${extras.chips.map(c => `<div class="chip" onclick="qs(this)">${c}</div>`).join('')}</div>` : ''}
        </div>
      </div>
      <div class="msg-time">${t}</div>`;
  } else {
    div.innerHTML = `
      <div class="msg-row"><div class="bubble">${html}</div></div>
      <div class="msg-time">${t}</div>`;
  }
  inner.appendChild(div);
  scrollDown();
}

function handleExpBtn(btn) {
  document.querySelectorAll('.exp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const fn = btn.dataset.fn;
  if (fn) eval(fn);
}

function addTyping() {
  const inner = document.getElementById('chat-inner');
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typing-msg';
  d.innerHTML = `<div class="msg-row"><div class="ai-avatar">⚡</div><div class="typing-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  inner.appendChild(d);
  scrollDown();
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

function scrollDown() {
  const s = document.getElementById('chat-scroll');
  setTimeout(() => s.scrollTop = s.scrollHeight, 60);
}

/* ============================================================
   意图处理
   ============================================================ */
const INTENTS = [
  {
    test: t => /今日待跟进|待跟进|今天的客户|跟进/.test(t),
    run: () => addMsg('ai',
      '今日 <strong>12位客户</strong> 待跟进，优先触达3位：',
      { expand:[
          {icon:'👤', label:'王建国 · 持仓浮亏', fn:"openClientCanvas('王建国')"},
          {icon:'👤', label:'赵静雯 · 配置优化', fn:"openClientCanvas('赵静雯')"},
          {icon:'👤', label:'李淑华 · 新增申购', fn:"openClientCanvas('李淑华')"},
          {icon:'📊', label:'今日看板', fn:'openDashboardCanvas()'}
        ],
        chips: ['📞 今日待执行动作', '📦 产品匹配结果']
      })
  },
  {
    test: t => t.includes('王建国'),
    run: () => { openClientCanvas('王建国'); addMsg('ai', '已打开 <strong>王建国</strong> 的客户文档。核心判定：持仓浮亏8%，有减仓意图，建议优先推送固收替代方案并预约复盘会。',
      {expand:[{icon:'📋', label:'查看客户文档', fn:"openClientCanvas('王建国')"}]}); }
  },
  {
    test: t => t.includes('赵静雯'),
    run: () => { openClientCanvas('赵静雯'); addMsg('ai', '已打开 <strong>赵静雯</strong> 的客户文档。超高净值，合格投资者，私行专属服务方案已匹配。',
      {expand:[{icon:'📋', label:'查看客户文档', fn:"openClientCanvas('赵静雯')"}]}); }
  },
  {
    test: t => t.includes('李淑华'),
    run: () => { openClientCanvas('李淑华'); addMsg('ai', '已打开 <strong>李淑华</strong> 的客户文档，新能源主题研报匹配度最高。'); }
  },
  {
    test: t => /产品匹配|产品推荐|推荐产品/.test(t),
    run: () => { openProductsCanvas(); addMsg('ai', '已打开产品匹配总览，右侧展示各客户最优匹配方案。', {expand:[{icon:'📦', label:'产品匹配总览', fn:'openProductsCanvas()'}]}); }
  },
  {
    test: t => /待执行|今日动作|动作清单|执行清单/.test(t),
    run: () => { openActionsCanvas(); addMsg('ai', '今日待执行动作共 <strong>5项</strong>，按客户分组展示在右侧文档中。', {expand:[{icon:'📞', label:'执行动作清单', fn:'openActionsCanvas()'}]}); }
  },
  {
    test: t => /看板|业绩|今日业绩|完成情况/.test(t),
    run: () => { openDashboardCanvas(); addMsg('ai', '今日业绩快照已打开，新增AUM +168万，客户触达5位。', {expand:[{icon:'📊', label:'今日看板', fn:'openDashboardCanvas()'}]}); }
  }
];

function process(text) {
  const t = text.trim();
  if (!t) return;
  addMsg('user', t);
  addTyping();

  // 检查意图
  for (const intent of INTENTS) {
    if (intent.test(t)) {
      setTimeout(() => { removeTyping(); intent.run(); }, 750);
      return;
    }
  }
  // 检查客户名
  for (const name of Object.keys(CLIENTS)) {
    if (t.includes(name)) {
      setTimeout(() => {
        removeTyping();
        openClientCanvas(name);
        addMsg('ai', `已打开 <strong>${name}</strong> 的客户文档，右侧查看详细分析。`);
      }, 750);
      return;
    }
  }
  // 默认回复
  setTimeout(() => {
    removeTyping();
    addMsg('ai', '明白了。您可以直接说出目标，例如：',
      {chips: ['📊 今日待跟进客户', '📋 分析王建国', '📊 今日看板', '📞 今日待执行动作']});
  }, 650);
}

function sendMsg() {
  const inp = document.getElementById('main-input');
  const t = inp.value.trim();
  if (!t) return;
  inp.value = ''; inp.style.height = 'auto';
  process(t);
}
function qs(el) { process(el.textContent.trim()); }
function ins(t) { const inp = document.getElementById('main-input'); inp.value = (inp.value+t).trimStart(); inp.focus(); }
function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

/* ============================================================
   初始化
   ============================================================ */
window.onload = () => {
  setTimeout(() => addMsg('ai',
    '早上好，张伟。今日 <strong>12位客户</strong> 待跟进，其中 <strong>3位建议优先触达</strong>。',
    { expand:[
        {icon:'📊', label:'今日看板', fn:'openDashboardCanvas()'},
        {icon:'👤', label:'王建国 · 持仓浮亏', fn:"openClientCanvas('王建国')"},
        {icon:'👤', label:'赵静雯 · 配置优化', fn:"openClientCanvas('赵静雯')"}
      ],
      chips: ['📊 今日待跟进客户', '📞 今日待执行动作', '📦 产品匹配结果']
    }), 300);
};
</script>
