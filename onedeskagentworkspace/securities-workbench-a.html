<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案A · 模型驱动·原子调用台 — 证券客户经理工作台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #1A1A2E;
  --primary-mid: #252540;
  --gold: #C9A96E;
  --gold-light: #E8D4A8;
  --gold-dim: rgba(201,169,110,0.15);
  --bg: #F0EFE8;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --text-2: #555566;
  --text-3: #888899;
  --border: #E2E0D8;
  --green: #27AE60;
  --red: #E74C3C;
  --orange: #F39C12;
  --blue: #2980B9;
  --purple: #8E44AD;
  --tag-h: #FFF0F0;
  --tag-h-border: #F5C6C6;
  --tag-m: #FFFBF0;
  --tag-m-border: #F5E6C6;
  --tag-n: #F0FFF4;
  --tag-n-border: #C6F5D8;
}
body { font-family: -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* 顶栏 */
.topbar {
  height: 52px; background: var(--primary); display: flex; align-items: center;
  padding: 0 20px; gap: 16px; flex-shrink: 0;
  border-bottom: 1px solid rgba(201,169,110,0.3);
}
.topbar-logo { color: var(--gold); font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
.topbar-tag { background: rgba(201,169,110,0.15); border: 1px solid rgba(201,169,110,0.3); color: var(--gold-light); font-size: 10px; padding: 2px 8px; border-radius: 10px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.topbar-user { display: flex; align-items: center; gap: 8px; }
.topbar-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--primary); }
.topbar-name { color: rgba(255,255,255,0.85); font-size: 13px; }
.topbar-date { color: var(--text-3); font-size: 12px; background: rgba(255,255,255,0.06); padding: 3px 10px; border-radius: 6px; }

/* 主布局 */
.workspace { flex: 1; display: flex; overflow: hidden; }

/* 左栏 */
.col-left {
  width: 260px; flex-shrink: 0; background: var(--primary-mid);
  display: flex; flex-direction: column; border-right: 1px solid rgba(201,169,110,0.2);
}
.col-left-header { padding: 14px 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.col-left-title { color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.search-box { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.07); border: 1px solid rgba(201,169,110,0.2); border-radius: 6px; padding: 6px 10px; }
.search-box input { background: none; border: none; outline: none; color: rgba(255,255,255,0.85); font-size: 12px; flex: 1; }
.search-box input::placeholder { color: rgba(255,255,255,0.35); }
.search-icon { color: rgba(201,169,110,0.6); font-size: 12px; }
.cat-tabs { display: flex; gap: 4px; padding: 8px 16px; flex-shrink: 0; }
.cat-tab { flex: 1; text-align: center; padding: 4px 0; border-radius: 5px; font-size: 10px; cursor: pointer; border: 1px solid transparent; color: rgba(255,255,255,0.45); transition: all 0.2s; }
.cat-tab.active, .cat-tab:hover { background: var(--gold-dim); border-color: rgba(201,169,110,0.4); color: var(--gold-light); }
.client-list { flex: 1; overflow-y: auto; padding: 6px 10px; }
.client-list::-webkit-scrollbar { width: 3px; }
.client-list::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.3); border-radius: 2px; }
.client-card {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.client-card:hover { background: rgba(201,169,110,0.1); border-color: rgba(201,169,110,0.3); }
.client-card.active { background: rgba(201,169,110,0.15); border-color: var(--gold); }
.client-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.client-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.client-name { color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 600; flex: 1; }
.client-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
.badge-h { background: rgba(231,76,60,0.2); color: #FF9494; border: 1px solid rgba(231,76,60,0.3); }
.badge-m { background: rgba(243,156,18,0.2); color: #FFD080; border: 1px solid rgba(243,156,18,0.3); }
.badge-n { background: rgba(39,174,96,0.2); color: #80FFB0; border: 1px solid rgba(39,174,96,0.3); }
.client-info { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.4); }
.client-asset { color: rgba(201,169,110,0.8); font-size: 11px; font-weight: 600; }
.left-footer { padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.08); }
.footer-stat { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.45); }
.footer-num { color: var(--gold); font-weight: 700; font-size: 13px; }

/* 中栏 */
.col-mid { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.col-mid::-webkit-scrollbar { width: 4px; }
.col-mid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 空状态 */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-3); }
.empty-icon { font-size: 48px; opacity: 0.4; }
.empty-text { font-size: 14px; }
.empty-hint { font-size: 12px; opacity: 0.7; }

/* 原子模型卡片通用 */
.atom-card { background: var(--card); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.atom-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.atom-color-bar { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }
.atom-tag { font-size: 9px; padding: 2px 7px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.atom-title { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
.atom-status { font-size: 11px; display: flex; align-items: center; gap: 4px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.atom-body { padding: 14px 16px; }

/* 客户分析卡 */
.analysis-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
.dim-item { background: #F8F7F4; border-radius: 6px; padding: 8px 10px; }
.dim-label { font-size: 10px; color: var(--text-3); margin-bottom: 3px; }
.dim-value { font-size: 12px; font-weight: 700; color: var(--text); }
.ai-judgment { background: linear-gradient(135deg,#FFF8F0,#FFF4E8); border: 1px solid rgba(201,169,110,0.3); border-radius: 6px; padding: 10px 12px; }
.ai-judgment-label { font-size: 10px; color: var(--gold); font-weight: 600; margin-bottom: 4px; }
.ai-judgment-text { font-size: 12px; color: var(--text-2); line-height: 1.6; }

/* 产品匹配卡 */
.product-list { display: flex; flex-direction: column; gap: 8px; }
.product-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #F8F7F4; border-radius: 7px; border-left: 3px solid transparent; transition: all 0.2s; cursor: pointer; }
.product-item:hover { background: #F0EFE8; }
.product-item.top { border-left-color: var(--gold); }
.product-rank { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.rank-1 { background: var(--gold); color: var(--primary); }
.rank-2 { background: #E0E0E0; color: #666; }
.rank-3 { background: #F5DEB3; color: #8B6914; }
.product-info { flex: 1; }
.product-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.product-reason { font-size: 11px; color: var(--text-3); }
.product-right { text-align: right; }
.product-return { font-size: 13px; font-weight: 700; color: var(--green); }
.product-type { font-size: 10px; color: var(--text-3); }
.match-score { display: flex; align-items: center; gap: 4px; font-size: 10px; }
.score-bar { height: 4px; border-radius: 2px; background: #E8E8E8; flex: 1; overflow: hidden; }
.score-fill { height: 100%; background: var(--gold); border-radius: 2px; }

/* 动作模型卡 */
.action-list { display: flex; flex-direction: column; gap: 8px; }
.action-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 7px; border: 1px solid var(--border); transition: all 0.2s; }
.action-item.done { opacity: 0.5; background: #F8F7F4; }
.action-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; margin-top: 1px; transition: all 0.2s; }
.action-check.checked { background: var(--green); border-color: var(--green); color: white; }
.action-content { flex: 1; }
.action-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.action-standard { font-size: 11px; color: var(--text-3); }
.action-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.action-time { font-size: 10px; color: var(--text-3); background: #F0EFE8; padding: 1px 6px; border-radius: 3px; }
.action-priority { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
.priority-high { background: rgba(231,76,60,0.1); color: var(--red); }
.priority-mid { background: rgba(243,156,18,0.1); color: var(--orange); }
.action-execute { margin-left: auto; }
.exec-hint { font-size: 11px; color: var(--gold); cursor: pointer; padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(201,169,110,0.3); }
.exec-hint:hover { background: var(--gold-dim); }

/* 合规验证卡 */
.verify-list { display: flex; flex-direction: column; gap: 8px; }
.verify-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 7px; border: 1px solid var(--border); }
.verify-icon { font-size: 14px; flex-shrink: 0; }
.verify-content { flex: 1; }
.verify-label { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.verify-desc { font-size: 11px; color: var(--text-3); }
.verify-result { font-size: 11px; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; font-weight: 600; }
.result-pass { background: rgba(39,174,96,0.1); color: var(--green); }
.result-warn { background: rgba(243,156,18,0.1); color: var(--orange); }
.result-fail { background: rgba(231,76,60,0.1); color: var(--red); }

/* 右栏 */
.col-right {
  width: 320px; flex-shrink: 0; background: var(--card);
  border-left: 1px solid var(--border); display: flex; flex-direction: column;
}
.right-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.right-title { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
.ai-badge { font-size: 9px; padding: 2px 7px; border-radius: 10px; background: linear-gradient(135deg,var(--gold),var(--gold-light)); color: var(--primary); font-weight: 700; }
.chat-area { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); }
.chat-bubble { max-width: 85%; }
.bubble-ai { align-self: flex-start; }
.bubble-user { align-self: flex-end; }
.bubble-content { padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.6; }
.bubble-ai .bubble-content { background: #F7F4EE; border: 1px solid var(--border); color: var(--text); border-radius: 2px 10px 10px 10px; }
.bubble-user .bubble-content { background: var(--primary); color: rgba(255,255,255,0.9); border-radius: 10px 2px 10px 10px; }
.bubble-time { font-size: 10px; color: var(--text-3); margin-top: 3px; padding: 0 4px; }
.bubble-ai .bubble-time { text-align: left; }
.bubble-user .bubble-time { text-align: right; }

.suggest-area { padding: 8px 14px; border-top: 1px solid var(--border); }
.suggest-label { font-size: 10px; color: var(--text-3); margin-bottom: 6px; }
.suggest-chips { display: flex; flex-direction: column; gap: 5px; }
.suggest-chip { font-size: 11px; padding: 6px 10px; border-radius: 6px; background: #F7F4EE; border: 1px solid var(--border); color: var(--text-2); cursor: pointer; transition: all 0.2s; }
.suggest-chip:hover { background: var(--gold-dim); border-color: rgba(201,169,110,0.4); color: var(--text); }

.chat-input-area { padding: 12px 14px; border-top: 1px solid var(--border); }
.chat-input-wrap { display: flex; align-items: flex-end; gap: 8px; background: #F8F7F4; border: 1px solid rgba(201,169,110,0.3); border-radius: 8px; padding: 8px 10px; }
.chat-input-wrap textarea { flex: 1; background: none; border: none; outline: none; font-size: 12px; color: var(--text); resize: none; max-height: 80px; line-height: 1.5; font-family: inherit; }
.chat-input-wrap textarea::placeholder { color: var(--text-3); }
.send-btn { width: 28px; height: 28px; border-radius: 6px; background: var(--gold); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.send-btn:hover { background: var(--primary); }
.send-btn svg { width: 14px; height: 14px; fill: white; }

/* 客户信息头部 */
.client-detail-header { background: var(--card); border-radius: 10px; padding: 16px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.client-detail-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),var(--gold-light)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--primary); flex-shrink: 0; }
.client-detail-info { flex: 1; }
.client-detail-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.client-detail-meta { display: flex; gap: 8px; align-items: center; }
.detail-tag { font-size: 10px; padding: 2px 7px; border-radius: 3px; }
.client-detail-stats { display: flex; gap: 20px; }
.stat-item { text-align: center; }
.stat-num { font-size: 14px; font-weight: 700; color: var(--text); }
.stat-label { font-size: 10px; color: var(--text-3); }
.loading-dots { display: inline-flex; gap: 4px; }
.loading-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.5} 40%{transform:scale(1);opacity:1} }
</style>
</head>

<div class="topbar">

  </div>

</div>

let currentCat = 'all';
let currentClient = null;

function renderClientList(filter='') {
  const list = document.getElementById('client-list');
  const filtered = clients.filter(c => {
    const catMatch = currentCat === 'all' || c.cat === currentCat;
    const nameMatch = !filter || c.name.includes(filter) || c.label.includes(filter);
    return catMatch && nameMatch;
  });
  list.innerHTML = filtered.map(c => `
    <div class="client-card ${currentClient && currentClient.id===c.id ? 'active' : ''}" onclick="selectClient(${c.id})">
      <div class="client-card-top">
        <div class="client-dot" style="background:${c.dot}"></div>
        <span class="client-name">${c.name}</span>
        <span class="client-badge ${c.badge}">${c.label.split('·')[0]}</span>
      </div>
      <div class="client-info">
        <span class="client-asset">${c.asset}</span>
        <span>${c.risk}</span>
        <span>${c.lastContact}</span>
      </div>
    </div>
  `).join('');
}

function switchCat(el, cat) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  renderClientList(document.getElementById('client-search').value);
}

function filterClients(val) { renderClientList(val); }

function selectClient(id) {
  const client = clients.find(c => c.id === id);
  if (!client) return;
  currentClient = client;
  renderClientList(document.getElementById('client-search').value);
  renderAtomPanel(client);
  updateSuggests(client);
  addChatBubble('ai', `正在为 <strong>${client.name}</strong> 调用原子模型...`);
  setTimeout(() => addChatBubble('ai', `✅ 模型调用完成：客户分析 · 产品匹配(${client.products.length}项) · 服务动作(${client.actions.length}项) · 合规验证`), 800);
}

function renderAtomPanel(c) {

          <div class="dim-item"><div class="dim-label">资产层级</div><div class="dim-value">${c.analysis.asset}</div></div>

      </div>

      </div>

            <div class="verify-item">

}

function toggleAction(clientId, idx) {
  const c = clients.find(c=>c.id===clientId);
  if (!c) return;
  c.actions[idx].done = !c.actions[idx].done;
  renderAtomPanel(c);
}

function executeAction(name) {
  addChatBubble('user', `执行动作：${name}`);
  setTimeout(() => addChatBubble('ai', `✅ 已为当前客户执行「${name}」，请在服务记录中确认发送状态。`), 600);
}

function updateSuggests(c) {
  document.getElementById('suggest-chips').innerHTML = `
    <div class="suggest-chip" onclick="sendSuggest(this)">📊 分析 ${c.name} 的持仓风险</div>
    <div class="suggest-chip" onclick="sendSuggest(this)">📄 为 ${c.name} 生成资产配置建议书</div>
    <div class="suggest-chip" onclick="sendSuggest(this)">🔁 查看同类型客户的服务记录</div>
  `;
}

function addChatBubble(role, text) {
  const area = document.getElementById('chat-area');
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const div = document.createElement('div');
  div.className = `chat-bubble bubble-${role}`;
  div.innerHTML = `<div class="bubble-content">${text}</div><div class="bubble-time">${time}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  addChatBubble('user', text);
  input.value = '';
  const responses = [
    '好的，正在为您分析，请稍候...',
    `已调用客户分析模型，${currentClient ? '基于' + currentClient.name + '的数据，' : ''}结果已更新到中间面板。`,
    '已识别到您的需求，相关原子模型正在被调用...',
    '任务已记录，我将持续追踪执行结果并在完成后提醒您。'
  ];
  setTimeout(() => addChatBubble('ai', responses[Math.floor(Math.random()*responses.length)]), 700);
}

function sendSuggest(el) {
  const text = el.textContent.trim();
  addChatBubble('user', text);
  setTimeout(() => addChatBubble('ai', `正在处理指令：「${text}」，调用相关原子模型中...`), 600);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// 初始化
renderClientList();
