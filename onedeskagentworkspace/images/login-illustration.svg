<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="480" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EC"/>
      <stop offset="1" stop-color="#EDE3D0"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="60" y1="40" x2="420" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#FAF7F2" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#D4B87A"/>
      <stop offset="1" stop-color="#C9A96E"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#2D2418" flood-opacity="0.09"/>
    </filter>
  </defs>

  <rect width="480" height="360" rx="24" fill="url(#bgGlow)"/>
  <circle cx="64" cy="72" r="48" fill="#C9A96E" fill-opacity="0.1"/>
  <circle cx="416" cy="88" r="32" fill="#9B7FD4" fill-opacity="0.12"/>
  <circle cx="400" cy="296" r="40" fill="#F5A623" fill-opacity="0.1"/>

  <!-- 主工作台面板 -->
  <g filter="url(#softShadow)">
    <rect x="56" y="48" width="368" height="264" rx="22" fill="url(#panelGrad)" stroke="rgba(201,169,110,0.28)" stroke-width="1.5"/>

    <!-- 顶栏 -->
    <rect x="72" y="64" width="336" height="52" rx="14" fill="#FAF7F2" stroke="rgba(201,169,110,0.15)" stroke-width="1"/>
    <rect x="88" y="78" width="88" height="10" rx="5" fill="#E8DFD0"/>
    <rect x="88" y="94" width="56" height="8" rx="4" fill="#F0EAE0"/>

    <!-- 顶栏头像组 -->
    <circle cx="248" cy="90" r="14" fill="#E8DFD0" stroke="#fff" stroke-width="2"/>
    <circle cx="248" cy="86" r="6" fill="#C9A96E" fill-opacity="0.45"/>
    <circle cx="282" cy="90" r="14" fill="#E8DFD0" stroke="#fff" stroke-width="2"/>
    <circle cx="282" cy="86" r="6" fill="#9B7FD4" fill-opacity="0.45"/>
    <circle cx="316" cy="90" r="14" fill="#E8DFD0" stroke="#fff" stroke-width="2"/>
    <circle cx="316" cy="86" r="6" fill="#F5A623" fill-opacity="0.45"/>
    <circle cx="350" cy="90" r="14" fill="#E8DFD0" stroke="#fff" stroke-width="2"/>
    <circle cx="350" cy="86" r="6" fill="#C9A96E" fill-opacity="0.45"/>
    <circle cx="384" cy="90" r="14" fill="#E8DFD0" stroke="#fff" stroke-width="2"/>
    <circle cx="384" cy="86" r="6" fill="#9B7FD4" fill-opacity="0.45"/>

    <!-- 今日任务区 -->
    <rect x="72" y="132" width="336" height="164" rx="16" fill="#FFFFFF" stroke="rgba(201,169,110,0.18)" stroke-width="1"/>

    <rect x="92" y="148" width="18" height="18" rx="5" fill="#FAF0E0"/>
    <path d="M96 154h10M96 158h7" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="118" y="150" width="72" height="12" rx="6" fill="#4A4034" fill-opacity="0.85"/>
    <circle cx="204" cy="156" r="10" fill="url(#goldGrad)"/>
    <text x="200" y="160" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <rect x="320" y="150" width="52" height="12" rx="6" fill="#F5EFE4"/>

    <!-- 任务条目 -->
    <rect x="92" y="178" width="296" height="28" rx="8" fill="#FBF8F3"/>
    <circle cx="106" cy="192" r="8" fill="url(#goldGrad)"/>
    <text x="106" y="196" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <rect x="122" y="186" width="200" height="8" rx="4" fill="#E8DFD0"/>
    <rect x="122" y="198" width="140" height="6" rx="3" fill="#F0EAE0"/>

    <rect x="92" y="214" width="296" height="28" rx="8" fill="#FBF8F3"/>
    <circle cx="106" cy="228" r="8" fill="url(#goldGrad)"/>
    <text x="106" y="232" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <rect x="122" y="222" width="180" height="8" rx="4" fill="#E8DFD0"/>
    <rect x="122" y="234" width="120" height="6" rx="3" fill="#F0EAE0"/>

    <rect x="92" y="250" width="296" height="28" rx="8" fill="#FBF8F3"/>
    <circle cx="106" cy="264" r="8" fill="url(#goldGrad)"/>
    <text x="106" y="268" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <rect x="122" y="258" width="220" height="8" rx="4" fill="#E8DFD0"/>
    <rect x="122" y="270" width="100" height="6" rx="3" fill="#F0EAE0"/>
  </g>

  <!-- 左侧助理卡片 -->
  <g filter="url(#softShadow)">
    <rect x="24" y="196" width="88" height="96" rx="14" fill="#FFFFFF" fill-opacity="0.94" stroke="rgba(201,169,110,0.22)" stroke-width="1"/>
    <circle cx="68" cy="228" r="18" fill="#E8DFD0"/>
    <circle cx="68" cy="222" r="8" fill="#C9A96E" fill-opacity="0.4"/>
    <rect x="40" y="254" width="56" height="8" rx="4" fill="#E8DFD0"/>
    <rect x="48" y="268" width="40" height="6" rx="3" fill="#F0EAE0"/>
  </g>

  <!-- 右侧对话气泡 -->
  <g filter="url(#softShadow)">
    <rect x="368" y="168" width="88" height="72" rx="14" fill="#FFFFFF" fill-opacity="0.94" stroke="rgba(201,169,110,0.22)" stroke-width="1"/>
    <rect x="384" y="184" width="56" height="8" rx="4" fill="#E8DFD0"/>
    <rect x="384" y="198" width="44" height="6" rx="3" fill="#F0EAE0"/>
    <rect x="384" y="212" width="52" height="16" rx="8" fill="url(#goldGrad)" fill-opacity="0.85"/>
  </g>

  <!-- 协同连线 -->
  <path d="M112 244 C140 220, 160 210, 368 204" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.3" stroke-linecap="round" stroke-dasharray="5 5"/>
</svg>
